{% extends 'base.html' %}

{% block title %}Add New Member - Directory Portal{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header text-center">
                แบบฟอร์มบันทึกข้อมูลประชากร
            </div>
            <div class="card-body">
                <form method="post" action="/form/">
                    {% csrf_token %}
                    <div class="mb-4">
                        <label for="name" class="form-label">ชื่อประชากร</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล" required>
                    </div>
                    
                    <div class="mb-4">
                        <label for="age" class="form-label">อายุ</label>
                        <input type="number" id="age" name="age" class="form-control" placeholder="กรุณากรอกอายุเป็นตัวเลข" required>
                    </div>
                    
                    <div class="d-flex gap-3 pt-2">
                        <button type="submit" class="btn btn-success flex-grow-1">ลงทะเบียน</button>
                        <button type="reset" class="btn btn-danger">ล้างข้อมูล</button>
                        <a href="/" class="btn btn-outline-secondary">ยกเลิก</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
